name: CI - Build, Lint e SonarQube

on:
  push:
    branches: [ "develop", "main" ]
  pull_request:
    branches: [ "develop", "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v5

      - name: Configurar Node.js 18
        uses: actions/setup-node@v5
        with:
          node-version: '18'

      - name: Instalar dependências
        run: npm install

      - name: Verificar sintaxe do projeto
        run: node --check index.js

  lint:
    runs-on: ubuntu-latest
    needs: build
    steps:

      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Gerar lockfile temporário
        run: npm install --package-lock-only

      - name: Instalar dependências
        run: npm install

      - name: Instalar globals para o ESLint
        run: npm install --no-save globals

      - name: Criar configuração temporária do ESLint
        run: |
          cat > eslint.config.js <<'EOF'
          const globals = require("globals");
          module.exports = [
            {
              files: ["**/*.js"],
              ignores: ["node_modules/**"],
              languageOptions: {
                ecmaVersion: 2021,
                sourceType: "commonjs",
                globals: {
                  ...globals.node,
                  ...globals.commonjs
                }
              },
              rules: {
                "no-unused-vars": "warn",
                "no-undef": "error"
              }
            }
          ];
          EOF

      - name: Rodar lint
        run: npx eslint .

      - name: Rodar build
        run: node --check index.js

      - name: Rodar build
        run: node --check index.js

  sonar:
    needs: estagio_lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=restaurante-lucas-fernando
            -Dsonar.projectName="Restaurante Lucas Fernando"
            -Dsonar.sources=.